<!DOCTYPE html>
<html>

<head>
    <title>AI Stock Scanner Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;padding:20px;">

<h2>AI Stock Scanner Test</h2>

<select id="scan">
    <option value="bottom">Bottom Fishing</option>
    <option value="orb">ORB</option>
    <option value="stage2">Stage 2</option>
    <option value="volume">Volume Breakout</option>
    <option value="smartmoney">Smart Money</option>
</select>

<br><br>

<button onclick="runScan()">Run Scan</button>

<br><br>

<pre id="result">Ready...</pre>

<script>

async function runScan() {

    const result = document.getElementById("result");

    result.textContent = "Loading...";

    try {

        const form = new FormData();

        form.append(
            "scan_type",
            document.getElementById("scan").value
        );

        const response = await fetch("/scan", {
            method: "POST",
            body: form
        });

        const text = await response.text();

        result.textContent =
            "HTTP Status : " +
            response.status +
            "\n\n" +
            text;

    }

    catch (err) {

        result.textContent =
            "ERROR\n\n" +
            err.toString();

    }

}

</script>

</body>

</html>
