<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Stock Scanner</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">
AI Stock Scanner
</h2>

<form id="scanForm">

<div class="row">

<div class="col-md-4">

<label class="form-label">
Scanner
</label>

<select
class="form-select"
name="scan_type">

<option value="bottom">
Bottom Fishing
</option>

<option value="volume">
Volume
</option>

<option value="smartmoney">
Smart Money
</option>

<option value="stage2">
Stage 2
</option>

<option value="orb">
ORB
</option>

<option value="relativestrength">
Relative Strength
</option>

</select>

</div>

<div class="col-md-3">

<label class="form-label">
Date
</label>

<input
type="date"
name="date"
class="form-control">

</div>

<div class="col-md-2 d-flex align-items-end">

<button
class="btn btn-primary w-100"
type="submit">

Scan

</button>

</div>

</div>

</form>

<hr>

<div id="summary"
class="mt-3">

</div>

<div
class="table-responsive mt-3">

<table
class="table table-bordered table-striped">

<thead>

<tr id="thead"></tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

</div>

<script>

document
.getElementById("scanForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

const form =
new FormData(this);

const res =
await fetch(
"/scan",
{
method:"POST",
body:form
}
);

const json =
await res.json();
  document.getElementById(
"summary"
).innerHTML =

`
<div class="alert alert-success">

<b>Total :</b> ${json.summary.total}

&nbsp;&nbsp;

<b>High :</b> ${json.summary.high}

&nbsp;&nbsp;

<b>Medium :</b> ${json.summary.medium}

&nbsp;&nbsp;

<b>Low :</b> ${json.summary.low}

</div>
`;

const tbody =
document.getElementById(
"tbody"
);

const thead =
document.getElementById(
"thead"
);

tbody.innerHTML = "";
thead.innerHTML = "";

if(json.data.length===0){

tbody.innerHTML =

"<tr><td>No Data</td></tr>";

return;

}

Object.keys(
json.data[0]
).forEach(col=>{

thead.innerHTML +=
`<th>${col}</th>`;

});

json.data.forEach(row=>{

let tr = "<tr>";

Object.values(row)
.forEach(val=>{

tr += `<td>${val}</td>`;

});

tr += "</tr>";

tbody.innerHTML += tr;

});

});

</script>

</body>

</html>
