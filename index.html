<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ultimate NSE Scanner</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:0;
    padding:15px;
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.scan{
    background:#00b894;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid #444;
    padding:8px;
    text-align:center;
}

th{
    background:#222;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
    background:#222;
    padding:10px;
    border-radius:8px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>Ultimate NSE Scanner</h1>

<button class="scan" onclick="loadStocks()">
Load NSE Stocks
</button>

<button class="scan" onclick="runScan('ORB')">
ORB Scan
</button>

<button class="scan" onclick="runScan('Volume')">
Volume Build Up
</button>

<button class="scan" onclick="runScan('Bottom')">
Bottom Fishing
</button>

<button class="scan" onclick="runScan('Momentum')">
Momentum
</button>

<button class="scan" onclick="runScan('Stage2')">
Stage 2
</button>

<button class="scan" onclick="runScan('RS')">
Relative Strength
</button>

<button class="scan" onclick="runScan('Super')">
Super Momentum
</button>

<button class="scan" onclick="testHistory()">
Test History API
</button>

<div id="status"></div>

<table>

<thead>

<tr>

<th>Symbol</th>

<th>Name</th>

</tr>

</thead>

<tbody id="results">

</tbody>

</table>

<script>

const PROXY =
"https://upstox-orb-proxy.onrender.com";

let stocks=[];

async function loadStocks(){

document.getElementById("status").innerHTML="Loading...";

const r=await fetch(PROXY+"/instruments/nse");

const data=await r.json();

stocks=data.data||[];

document.getElementById("status").innerHTML=
stocks.length+" Stocks Loaded";

showStocks(stocks.slice(0,100));

}

function showStocks(arr){

let html="";

arr.forEach(s=>{

html+=`
<tr>
<td>${s.symbol}</td>
<td>${s.name}</td>
</tr>
`;

});

document.getElementById("results").innerHTML=html;

}

function runScan(type){

alert(type+" Scanner logic next step me add karenge");

}

async function testHistory(){

const token=prompt("Enter Upstox Access Token");

if(!token){
return;
}

const url=
PROXY+
"/api/v2/historical-candle/NSE_EQ|INE002A01018/day/2026-06-26/2026-01-01";

try{

const r=await fetch(url,{
headers:{
Authorization:"Bearer "+token
}
});

const data=await r.json();

console.log(data);

document.getElementById("status").innerHTML=
"<pre>"+JSON.stringify(data,null,2)+"</pre>";

}catch(e){

document.getElementById("status").innerHTML=
e.toString();

}

}

</script>

</body>
    </html>
